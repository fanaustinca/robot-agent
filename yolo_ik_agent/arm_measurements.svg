<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 750" font-family="monospace" font-size="13">
  <style>
    .bone { stroke: #555; stroke-width: 8; stroke-linecap: round; }
    .joint { fill: #e63946; stroke: #333; stroke-width: 2; }
    .dim-line { stroke: #0077cc; stroke-width: 1.5; stroke-dasharray: 6,3; }
    .dim-arrow { stroke: #0077cc; stroke-width: 1.5; fill: none; }
    .dim-text { fill: #0077cc; font-weight: bold; font-size: 14px; }
    .label { fill: #333; font-size: 13px; }
    .label-bold { fill: #222; font-size: 14px; font-weight: bold; }
    .measure-tip { fill: #888; font-size: 11px; font-style: italic; }
    .title { fill: #222; font-size: 20px; font-weight: bold; }
    .subtitle { fill: #666; font-size: 12px; }
    .gripper-line { stroke: #555; stroke-width: 4; stroke-linecap: round; }
    .base-rect { fill: #ddd; stroke: #999; stroke-width: 2; }
    .table-line { stroke: #aaa; stroke-width: 1; stroke-dasharray: 4,4; }
    .section-bg { fill: #f8f8f8; stroke: #ddd; stroke-width: 1; rx: 8; }
  </style>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title">SO-101 Arm — Bone Length Verification</text>
  <text x="350" y="48" text-anchor="middle" class="subtitle">Measure pivot-to-pivot on physical arm. Compare with URDF values below.</text>

  <!-- Background for arm diagram -->
  <rect x="30" y="60" width="400" height="680" class="section-bg"/>

  <!-- Table surface -->
  <line x1="40" y1="650" x2="420" y2="650" class="table-line"/>
  <text x="45" y="668" class="measure-tip">table surface</text>

  <!-- Base block -->
  <rect x="170" y="610" width="60" height="40" class="base-rect" rx="4"/>
  <text x="200" y="635" text-anchor="middle" class="label">BASE</text>

  <!-- Joint positions (approximate arm in partially extended pose) -->
  <!-- Base pivot (joint 1 - pan) -->
  <!-- Shoulder pivot (joint 2 - lift): 9.5cm above base -->
  <!-- Elbow pivot (joint 3): 11.3cm from shoulder -->
  <!-- Wrist pivot (joint 4): 13.5cm from elbow -->
  <!-- Gripper roll (joint 5): 6.1cm from wrist -->
  <!-- Gripper tip: 10cm from roll -->

  <!-- Bone: base to shoulder pivot -->
  <line x1="200" y1="610" x2="200" y2="520" class="bone"/>

  <!-- Bone: shoulder to elbow (angled forward-up) -->
  <line x1="200" y1="520" x2="250" y2="400" class="bone"/>

  <!-- Bone: elbow to wrist (angled forward-down) -->
  <line x1="250" y1="400" x2="310" y2="280" class="bone"/>

  <!-- Bone: wrist to gripper roll -->
  <line x1="310" y1="280" x2="335" y2="230" class="bone"/>

  <!-- Bone: roll to gripper tip -->
  <line x1="335" y1="230" x2="380" y2="150" class="bone"/>

  <!-- Gripper jaws -->
  <line x1="380" y1="150" x2="395" y2="120" class="gripper-line"/>
  <line x1="380" y1="150" x2="365" y2="120" class="gripper-line"/>
  <text x="380" y="112" text-anchor="middle" class="label" font-size="11">tip</text>

  <!-- Joints (circles) -->
  <circle cx="200" cy="610" r="8" class="joint"/>  <!-- base -->
  <circle cx="200" cy="520" r="8" class="joint"/>  <!-- shoulder/pan -->
  <circle cx="250" cy="400" r="8" class="joint"/>  <!-- elbow -->
  <circle cx="310" cy="280" r="8" class="joint"/>  <!-- wrist flex -->
  <circle cx="335" cy="230" r="8" class="joint"/>  <!-- wrist roll -->
  <circle cx="380" cy="150" r="6" style="fill:#ff9f1c; stroke:#333; stroke-width:2;"/>  <!-- gripper tip -->

  <!-- Joint labels -->
  <text x="155" y="615" text-anchor="end" class="label-bold">J1</text>
  <text x="155" y="524" text-anchor="end" class="label-bold">J2</text>
  <text x="245" y="425" text-anchor="end" class="label-bold">J3</text>
  <text x="305" y="305" text-anchor="end" class="label-bold">J4</text>
  <text x="330" y="255" text-anchor="end" class="label-bold">J5</text>

  <text x="138" y="630" text-anchor="end" class="label" font-size="11">pan</text>
  <text x="138" y="539" text-anchor="end" class="label" font-size="11">lift</text>
  <text x="228" y="440" text-anchor="end" class="label" font-size="11">elbow</text>
  <text x="288" y="320" text-anchor="end" class="label" font-size="11">wrist flex</text>
  <text x="313" y="268" text-anchor="end" class="label" font-size="11">wrist roll</text>

  <!-- ============ DIMENSION LINES ============ -->

  <!-- Dim A: base to shoulder (9.5cm) -->
  <line x1="105" y1="610" x2="105" y2="520" class="dim-line"/>
  <line x1="95" y1="610" x2="115" y2="610" class="dim-arrow"/>
  <line x1="95" y1="520" x2="115" y2="520" class="dim-arrow"/>
  <text x="100" y="570" text-anchor="middle" class="dim-text" transform="rotate(-90,100,570)">9.5 cm</text>

  <!-- Dim B: shoulder to elbow (11.3cm) -->
  <line x1="68" y1="520" x2="68" y2="400" class="dim-line"/>
  <line x1="58" y1="520" x2="78" y2="520" class="dim-arrow"/>
  <line x1="58" y1="400" x2="78" y2="400" class="dim-arrow"/>
  <text x="63" y="465" text-anchor="middle" class="dim-text" transform="rotate(-90,63,465)">11.3 cm</text>

  <!-- Dim C: elbow to wrist (13.5cm) -->
  <line x1="68" y1="400" x2="68" y2="280" class="dim-line"/>
  <line x1="58" y1="400" x2="78" y2="400" class="dim-arrow"/>
  <line x1="58" y1="280" x2="78" y2="280" class="dim-arrow"/>
  <text x="63" y="345" text-anchor="middle" class="dim-text" transform="rotate(-90,63,345)">13.5 cm</text>

  <!-- Dim D: wrist to roll (6.1cm) -->
  <line x1="68" y1="280" x2="68" y2="230" class="dim-line"/>
  <line x1="58" y1="280" x2="78" y2="280" class="dim-arrow"/>
  <line x1="58" y1="230" x2="78" y2="230" class="dim-arrow"/>
  <text x="55" y="258" text-anchor="middle" class="dim-text" font-size="12" transform="rotate(-90,55,258)">6.1 cm</text>

  <!-- Dim E: roll to tip (10cm) - MANUALLY ADDED, NOT FROM URDF -->
  <line x1="68" y1="230" x2="68" y2="150" class="dim-line" style="stroke:#e63946;"/>
  <line x1="58" y1="230" x2="78" y2="230" style="stroke:#e63946; stroke-width:1.5;"/>
  <line x1="58" y1="150" x2="78" y2="150" style="stroke:#e63946; stroke-width:1.5;"/>
  <text x="63" y="195" text-anchor="middle" style="fill:#e63946; font-weight:bold; font-size:14px;" transform="rotate(-90,63,195)">10.0 cm</text>

  <!-- ============ REFERENCE TABLE ============ -->
  <rect x="440" y="60" width="250" height="680" class="section-bg"/>

  <text x="565" y="90" text-anchor="middle" class="label-bold" font-size="16">Measurement Guide</text>

  <!-- Segment A -->
  <rect x="455" y="110" width="220" height="88" rx="4" fill="#fff" stroke="#ddd"/>
  <text x="465" y="130" class="label-bold" fill="#0077cc">A: Base to Shoulder</text>
  <text x="465" y="148" class="label">URDF: 9.5 cm</text>
  <text x="465" y="165" class="measure-tip">Measure: table surface to</text>
  <text x="465" y="180" class="measure-tip">center of shoulder pivot bolt</text>
  <text x="465" y="195" class="label" font-size="11">Joint 1 origin z = 0.0949m</text>

  <!-- Segment B -->
  <rect x="455" y="210" width="220" height="88" rx="4" fill="#fff" stroke="#ddd"/>
  <text x="465" y="230" class="label-bold" fill="#0077cc">B: Upper Arm</text>
  <text x="465" y="248" class="label">URDF: 11.3 cm</text>
  <text x="465" y="265" class="measure-tip">Measure: shoulder pivot center</text>
  <text x="465" y="280" class="measure-tip">to elbow pivot center</text>
  <text x="465" y="295" class="label" font-size="11">Joint 3 origin x = -0.11257m</text>

  <!-- Segment C -->
  <rect x="455" y="310" width="220" height="88" rx="4" fill="#fff" stroke="#ddd"/>
  <text x="465" y="330" class="label-bold" fill="#0077cc">C: Forearm</text>
  <text x="465" y="348" class="label">URDF: 13.5 cm</text>
  <text x="465" y="365" class="measure-tip">Measure: elbow pivot center</text>
  <text x="465" y="380" class="measure-tip">to wrist flex pivot center</text>
  <text x="465" y="395" class="label" font-size="11">Joint 4 origin x = -0.1349m</text>

  <!-- Segment D -->
  <rect x="455" y="410" width="220" height="88" rx="4" fill="#fff" stroke="#ddd"/>
  <text x="465" y="430" class="label-bold" fill="#0077cc">D: Wrist</text>
  <text x="465" y="448" class="label">URDF: 6.1 cm</text>
  <text x="465" y="465" class="measure-tip">Measure: wrist flex pivot</text>
  <text x="465" y="480" class="measure-tip">to wrist roll axis center</text>
  <text x="465" y="495" class="label" font-size="11">Joint 5 origin y = -0.0611m</text>

  <!-- Segment E (suspect) -->
  <rect x="455" y="510" width="220" height="108" rx="4" fill="#fff3f3" stroke="#e63946"/>
  <text x="465" y="530" class="label-bold" fill="#e63946">E: Gripper Tip (CHECK THIS)</text>
  <text x="465" y="548" class="label">Code: 10.0 cm (hardcoded)</text>
  <text x="465" y="565" class="measure-tip">Measure: wrist roll axis center</text>
  <text x="465" y="580" class="measure-tip">to where gripper tips close</text>
  <text x="465" y="597" class="label" font-size="11">arm_kinematics.py line 81</text>
  <text x="465" y="614" style="fill:#e63946; font-size:11px; font-weight:bold;">NOT from URDF — most likely wrong</text>

  <!-- Legend -->
  <rect x="455" y="635" width="220" height="95" rx="4" fill="#fff" stroke="#ddd"/>
  <text x="465" y="655" class="label-bold">Legend</text>
  <circle cx="475" cy="672" r="6" class="joint"/>
  <text x="490" y="676" class="label" font-size="11">Joint pivot (measure center-to-center)</text>
  <circle cx="475" cy="695" r="5" style="fill:#ff9f1c; stroke:#333; stroke-width:1.5;"/>
  <text x="490" y="699" class="label" font-size="11">Gripper tip (where jaws close)</text>
  <line x1="465" y1="715" x2="485" y2="715" style="stroke:#e63946; stroke-width:2;"/>
  <text x="490" y="719" class="label" font-size="11" fill="#e63946">Suspect measurement</text>
</svg>
